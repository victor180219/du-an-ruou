<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Giá Rượu Whisky</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #1a0e0a 0%, #2c1810 40%, #3d2317 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: linear-gradient(145deg, rgba(60, 35, 20, 0.95), rgba(40, 22, 12, 0.98));
            border: 1px solid rgba(205, 165, 100, 0.3);
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 520px;
            width: 100%;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(205, 165, 100, 0.15);
        }

        .logo {
            text-align: center;
            margin-bottom: 8px;
            font-size: 36px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: #cda564;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: rgba(205, 165, 100, 0.6);
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 36px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(205, 165, 100, 0.4), transparent);
            margin: 28px 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #cda564;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(205, 165, 100, 0.25);
            border-radius: 8px;
            color: #f0e6d6;
            font-size: 16px;
            font-family: 'Lato', sans-serif;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #cda564;
            box-shadow: 0 0 12px rgba(205, 165, 100, 0.15);
        }

        input::placeholder {
            color: rgba(240, 230, 214, 0.3);
        }

        .discount-info {
            background: rgba(205, 165, 100, 0.08);
            border: 1px solid rgba(205, 165, 100, 0.15);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 24px;
        }

        .discount-info p {
            color: rgba(240, 230, 214, 0.7);
            font-size: 13px;
            line-height: 1.8;
        }

        .discount-info span {
            color: #cda564;
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #cda564, #a67c3d);
            border: none;
            border-radius: 8px;
            color: #1a0e0a;
            font-family: 'Lato', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(205, 165, 100, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            display: none;
            margin-top: 28px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            font-family: 'Playfair Display', serif;
            color: #cda564;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(205, 165, 100, 0.1);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: rgba(240, 230, 214, 0.7);
            font-size: 14px;
        }

        .result-value {
            color: #f0e6d6;
            font-size: 16px;
            font-weight: 600;
        }

        .result-item.total {
            margin-top: 8px;
            padding-top: 16px;
            border-top: 1px solid rgba(205, 165, 100, 0.3);
            border-bottom: none;
        }

        .result-item.total .result-label {
            color: #cda564;
            font-size: 16px;
            font-weight: 700;
        }

        .result-item.total .result-value {
            color: #cda564;
            font-size: 22px;
            font-weight: 700;
        }

        .discount-badge {
            display: inline-block;
            background: rgba(205, 165, 100, 0.15);
            color: #cda564;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }

        .product-name {
            text-align: center;
            color: #f0e6d6;
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            margin-bottom: 16px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🥃</div>
        <h1>Báo Giá Rượu Whisky</h1>
        <p class="subtitle">Premium Spirits</p>

        <div class="form-group">
            <label>Tên rượu</label>
            <input type="text" id="tenRuou" placeholder="VD: Johnnie Walker Blue Label">
        </div>

        <div class="form-group">
            <label>Giá gốc (VNĐ / chai)</label>
            <input type="number" id="giaGoc" placeholder="VD: 1500000" min="0">
        </div>

        <div class="form-group">
            <label>Số lượng chai</label>
            <input type="number" id="soLuong" placeholder="VD: 12" min="1">
        </div>

        <div class="discount-info">
            <p>🏷 Mua từ <span>10 chai</span>: giảm <span>5%</span></p>
            <p>🏷 Mua từ <span>50 chai</span>: giảm <span>10%</span></p>
        </div>

        <button onclick="tinhGia()">Tính báo giá</button>

        <div class="result" id="ketQua">
            <div class="divider"></div>
            <p class="result-header">Bảng Báo Giá</p>
            <p class="product-name" id="tenSP"></p>

            <div class="result-item">
                <span class="result-label">Đơn giá</span>
                <span class="result-value" id="donGia"></span>
            </div>
            <div class="result-item">
                <span class="result-label">Số lượng</span>
                <span class="result-value" id="sl"></span>
            </div>
            <div class="result-item">
                <span class="result-label">Tổng tiền trước giảm</span>
                <span class="result-value" id="tongTruoc"></span>
            </div>
            <div class="result-item">
                <span class="result-label" id="labelChietKhau">Chiết khấu</span>
                <span class="result-value" id="chietKhau"></span>
            </div>
            <div class="result-item total">
                <span class="result-label">Thanh toán</span>
                <span class="result-value" id="tongCuoi"></span>
            </div>
        </div>
    </div>

    <script>
        function formatVND(n) {
            return n.toLocaleString('vi-VN') + ' ₫';
        }

        function tinhGia() {
            var ten = document.getElementById('tenRuou').value.trim();
            var gia = parseFloat(document.getElementById('giaGoc').value);
            var sl = parseInt(document.getElementById('soLuong').value);

            if (!ten) { alert('Vui lòng nhập tên rượu.'); return; }
            if (isNaN(gia) || gia <= 0) { alert('Vui lòng nhập giá gốc hợp lệ.'); return; }
            if (isNaN(sl) || sl <= 0) { alert('Vui lòng nhập số lượng hợp lệ.'); return; }

            var tongTruoc = gia * sl;
            var phanTram = 0;

            if (sl >= 50) {
                phanTram = 10;
            } else if (sl >= 10) {
                phanTram = 5;
            }

            var tienGiam = tongTruoc * phanTram / 100;
            var tongCuoi = tongTruoc - tienGiam;

            document.getElementById('tenSP').textContent = '— ' + ten + ' —';
            document.getElementById('donGia').textContent = formatVND(gia);
            document.getElementById('sl').textContent = sl + ' chai';
            document.getElementById('tongTruoc').textContent = formatVND(tongTruoc);

            var labelCK = 'Chiết khấu';
            if (phanTram > 0) {
                labelCK += ' ';
                document.getElementById('labelChietKhau').innerHTML = labelCK + '<span class="discount-badge">-' + phanTram + '%</span>';
                document.getElementById('chietKhau').textContent = '- ' + formatVND(tienGiam);
            } else {
                document.getElementById('labelChietKhau').textContent = 'Chiết khấu';
                document.getElementById('chietKhau').textContent = 'Không áp dụng';
            }

            document.getElementById('tongCuoi').textContent = formatVND(tongCuoi);

            var ketQua = document.getElementById('ketQua');
            ketQua.style.display = 'block';
            ketQua.style.animation = 'none';
            ketQua.offsetHeight;
            ketQua.style.animation = 'fadeIn 0.4s ease';
        }
    </script>
</body>
</html>
